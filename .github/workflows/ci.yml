name: Django and Next.js CI/CD

on:
  push:
    branches: [action3]
  pull_request:
    branches: [action3]

jobs:
  # Django CI
  django-ci:
    runs-on: ubuntu-latest
    container: python:3.11.9-slim

    services:
      mysql:
        image: mysql:latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: django_db
          MYSQL_PASSWORD: root
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: lazybit/minio
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y default-libmysqlclient-dev build-essential pkg-config docker.io curl

      - name: Install dependencies and run tests
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Test Django application
        run: |
          cd backend
          python manage.py test
        env:
          DJANGO_ALLOWED_HOSTS: localhost
          DATABASE_URL: mysql://root:root@mysql:3306/django_db
          MINIO_STORAGE_URL: http://minio:9000/blog
          MINIO_STORAGE_ACCESS_KEY: minio
          MINIO_STORAGE_SECRET_KEY: minio123

      - name: Build Docker image for Django
        run: |
          cd backend
          docker build -t my-django-app:latest .

      - name: Run Django Docker container
        run: |
          docker run -d --name django-app -p 8000:8000 \
            -e DATABASE_URL=mysql://root:root@mysql:3306/django_db \
            -e MINIO_STORAGE_URL=http://minio:9000/blog \
            -e MINIO_STORAGE_ACCESS_KEY=minio \
            -e MINIO_STORAGE_SECRET_KEY=minio123 \
            -e DJANGO_ALLOWED_HOSTS="localhost 127.0.0.1" \
            --health-cmd "curl -f http://localhost:8000/api/blogs || exit 1" \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            my-django-app:latest

      - name: Wait for Django container to become healthy
        run: |
          for i in $(seq 1 10); do \
            health=$(docker inspect --format='{{json .State.Health.Status}}' django-app); \
            echo "Django health status: $health"; \
            if [ "$health" = "\"healthy\"" ]; then \
              echo "Django container is healthy"; \
              break; \
            elif [ "$i" -eq 10 ]; then \
              echo "Django container is unhealthy"; \
              docker logs django-app; \
              exit 1; \
            fi; \
            sleep 10; \
          done

  nextjs-ci:
    needs: django-ci
    runs-on: ubuntu-latest
    container: node:20

    services:
      mysql:
        image: mysql:latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: django_db
          MYSQL_PASSWORD: root
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: lazybit/minio
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Run Django Docker container
        run: |
          docker run -d --name django-app -p 8000:8000 \
            -e DATABASE_URL=mysql://root:root@mysql:3306/django_db \
            -e MINIO_STORAGE_URL=http://minio:9000/blog \
            -e MINIO_STORAGE_ACCESS_KEY=minio \
            -e MINIO_STORAGE_SECRET_KEY=minio123 \
            -e DJANGO_ALLOWED_HOSTS="localhost 127.0.0.1" \
            --health-cmd "curl -f http://localhost:8000/api/blogs || exit 1" \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            my-django-app:latest
     
      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm install

      - name: Build Next.js application
        working-directory: ./frontend
        run: |
          npm run build

      - name: Build Docker image for Next.js
        run: |
          docker build -t my-nextjs-app:latest .

      - name: Run Next.js Docker container
        run: |
          docker run -d --name nextjs-app -p 3000:3000 \
            -e DATABASE_URL=mysql://root:root@mysql:3306/django_db \
            -e MINIO_STORAGE_URL=http://minio:9000/blog \
            -e MINIO_STORAGE_ACCESS_KEY=minio \
            -e MINIO_STORAGE_SECRET_KEY=minio123 \
            -e DJANGO_ALLOWED_HOSTS="localhost
      
      


  # Push releases
  push_release:
    runs-on: ubuntu-latest
    needs: [nextjs-ci]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Save Django Docker image
        run: docker save my-django-app:latest | gzip > my-django-app.tar.gz


      - name: Load and push Django Docker image
        run: |
          docker load < my-django-app.tar.gz
          docker tag my-django-app:latest my-django-app:prod
          docker push my-django-app:prod

      - name: Load and push Next.js Docker image
        run: |
          docker load < my-nextjs-app.tar.gz
          docker tag my-nextjs-app:latest my-nextjs-app:prod
          docker push my-nextjs-app:prod
