name: Django CI/CD

on:
  push:
    branches: [action]
  pull_request:
    branches: [action]

jobs:
  test:
    runs-on: ubuntu-latest
    container: python:3.11.9-slim

    services:
      mysql:
        image: mysql:latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: django_db
          MYSQL_PASSWORD: root
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: lazybit/minio
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        options: >-
          --name=minio
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y default-libmysqlclient-dev build-essential pkg-config
      # Set up Docker Buildx for building multi-architecture Docker images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Cache Docker layers to speed up the build process
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Install the dependencies and run the tests
      - name: Install dependencies and run tests
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Test the Django application
      - name: Test Django application
        run: |
          cd backend
          python manage.py test
        env:
          DJANGO_ALLOWED_HOSTS: localhost
          DATABASE_URL: mysql://root:root@mysql:3306/django_db
          MINIO_STORAGE_URL: http://minio:9000/blog
          MINIO_STORAGE_ACCESS_KEY: minio
          MINIO_STORAGE_SECRET_KEY: minio123

  # build docker image without push it to docker hub
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          cd backend 
          docker buildx build --tag my-django-app:latest --file Dockerfile .

      - name: Save Docker image to file
        run: |
          docker save my-django-app:latest | gzip > my-django-app.tar.gz

      # - name: Check if Release Exists
      #   id: check_release
      #   run: |
      #     if gh release view ${{ github.ref_name }} > /dev/null 2>&1; then
      #       echo "release_exists=true" >> $GITHUB_ENV
      #     else
      #       echo "release_exists=false" >> $GITHUB_ENV
      #     fi
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Delete Existing Release and Tag
      #   if: env.release_exists == 'true'
      #   run: |
      #     gh release delete ${{ github.ref_name }} --yes
      #     git tag -d ${{ github.ref_name }}
      #     git push origin --delete ${{ github.ref_name }}
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./my-django-app.tar.gz
          asset_name: my-django-app.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
