name: Django CI/CD

on:
  push:
    branches: [action2]
  pull_request:
    branches: [action2]

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.11.9-slim

    services:
      mysql:
        image: mysql:latest
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: django_db
          MYSQL_PASSWORD: root
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: lazybit/minio
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        options: >-
          --name=minio
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y default-libmysqlclient-dev build-essential pkg-config
      # Set up Docker Buildx for building multi-architecture Docker images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Cache Docker layers to speed up the build process
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Install the dependencies and run the tests
      - name: Install dependencies and run tests
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Test the Django application
      - name: Test Django application
        run: |
          cd backend
          python manage.py test
        env:
          DJANGO_ALLOWED_HOSTS: localhost
          DATABASE_URL: mysql://root:root@mysql:3306/django_db
          MINIO_STORAGE_URL: http://minio:9000/blog
          MINIO_STORAGE_ACCESS_KEY: minio
          MINIO_STORAGE_SECRET_KEY: minio123

    # build docker
    build:
      runs-on: ubuntu-latest
      needs: test
      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2

        - name: Cache Docker layers
          uses: actions/cache@v3
          with:
            path: /tmp/.buildx-cache
            key: ${{ runner.os }}-buildx-${{ github.sha }}
            restore-keys: |
              ${{ runner.os }}-buildx-

        - name: Build Docker image
          run: |
            cd backend 
            docker buildx build --tag my-django-app:latest --file Dockerfile .
        - name: Save Docker image to file
          run: |
            docker save my-django-app:latest | gzip > my-django-app.tar.gz
    
    # push release
